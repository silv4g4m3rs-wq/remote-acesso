<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-size: 13px;
    }

    #header {
      padding: 10px 14px;
      background: #16213e;
      border-bottom: 1px solid #1e2d50;
      font-weight: 600;
      color: #94a3b8;
      user-select: none;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #1e2d50; border-radius: 2px; }

    .msg {
      max-width: 88%;
      padding: 7px 11px;
      border-radius: 14px;
      line-height: 1.45;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg.me {
      align-self: flex-end;
      background: #1a4a8a;
      color: #e8f0fe;
      border-bottom-right-radius: 4px;
    }

    .msg.them {
      align-self: flex-start;
      background: #1e293b;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .msg .sender {
      font-size: 10px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .msg.me .sender { color: #93c5fd; }

    .system-msg {
      text-align: center;
      font-size: 11px;
      color: #475569;
      padding: 4px 0;
    }

    #input-row {
      display: flex;
      gap: 8px;
      padding: 10px;
      background: #16213e;
      border-top: 1px solid #1e2d50;
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      background: #0a0e1a;
      border: 1px solid #1e2d50;
      border-radius: 10px;
      color: #e0e0f0;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    #chat-input:focus { border-color: #3b6fd4; }
    #chat-input:disabled { opacity: 0.4; cursor: not-allowed; }

    #btn-send {
      background: #3b6fd4;
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 18px;
      padding: 0 14px;
      transition: background 0.15s;
      line-height: 1;
    }

    #btn-send:hover:not(:disabled) { background: #4a7fe4; }
    #btn-send:active:not(:disabled) { background: #2b5fc4; }
    #btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="header">💬 Chat</div>
  <div id="messages"></div>
  <div id="input-row">
    <input id="chat-input" type="text" placeholder="Mensagem..." autocomplete="off">
    <button id="btn-send">›</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('chat-input');
    const btnSend    = document.getElementById('btn-send');

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function appendMsg(from, text) {
      const isMine = (from === 'Eu');
      const div = document.createElement('div');
      div.className = `msg ${isMine ? 'me' : 'them'}`;
      div.innerHTML = `<div class="sender">${escHtml(from)}</div>${escHtml(text)}`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendSystem(text) {
      const div = document.createElement('div');
      div.className = 'system-msg';
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function sendMsg() {
      const text = inputEl.value.trim();
      if (!text || inputEl.disabled) return;
      inputEl.value = '';
      window.chatAPI.send(text);
      appendMsg('Eu', text);
    }

    btnSend.addEventListener('click', sendMsg);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

    window.chatAPI.onMessage(({ from, text }) => appendMsg(from, text));

    window.chatAPI.onClose(() => {
      inputEl.disabled  = true;
      btnSend.disabled  = true;
      appendSystem('— Sessão encerrada —');
    });

    inputEl.focus();
  </script>
</body>
</html>
